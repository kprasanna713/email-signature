<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Signature - Prasanna Kumar V</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f0f2f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    h1 {
      font-size: 22px;
      color: #2c3e50;
      margin-bottom: 8px;
    }
    p.instructions {
      font-size: 14px;
      color: #666;
      margin-bottom: 24px;
      text-align: center;
      max-width: 500px;
      line-height: 1.5;
    }
    .signature-wrapper {
      background: #ffffff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }
    .copy-btn {
      margin-top: 20px;
      padding: 12px 28px;
      background: #2c3e50;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .copy-btn:hover { background: #1a252f; }
    .copy-btn.copied { background: #27ae60; }
  </style>
</head>
<body>

  <h1>Email Signature</h1>
  <p class="instructions">
    Click "Copy Signature" then paste into your email client's signature settings.<br>
    Works with Gmail, Outlook, Apple Mail, and more.
  </p>

  <div class="signature-wrapper">
    <!-- ======== EMAIL SIGNATURE START ======== -->
    <div id="signature">

          <td style="vertical-align: top; padding-right: 16px;">
            <img
              src="https://kprasanna713.github.io/email-signature/images/profile.jpg"

              width="130"
              height="130"
              style="border-radius: 8px; display: block; object-fit: cover;"
            />

          <!-- Separator -->
          <td style="width: 3px; background-color: #2c3e50; font-size: 0; line-height: 0;" width="3">
            &nbsp;
          </td>

          <!-- Info Column -->
          <td style="vertical-align: top; padding-left: 16px;">
            <!-- Name -->
            <table cellpadding="0" cellspacing="0" border="0">
              <tr>
                <td style="font-size: 20px; font-weight: bold; color: #2c3e50; padding-bottom: 2px; font-family: Arial, Helvetica, sans-serif;">
                  Prasanna Kumar V
                </td>
              </tr>
              <tr>
                <td style="font-size: 14px; color: #7f8c8d; padding-bottom: 12px; font-family: Arial, Helvetica, sans-serif;">
                  Data Engineer
                </td>
              </tr>
            </table>

            <!-- Contact Details -->
            <table cellpadding="0" cellspacing="0" border="0" style="font-family: Arial, Helvetica, sans-serif;">
              <!-- Phone -->
              <tr>
                <td style="padding-bottom: 6px; font-size: 13px; color: #555555;">
                  <img src="https://kprasanna713.github.io/email-signature/icons/phone.svg" alt="Phone" width="16" height="16" style="vertical-align: middle; margin-right: 6px;" />
                  <a href="tel:+447721928541" style="color: #555555; text-decoration: none; vertical-align: middle;">+44 7721928541</a>
                </td>
              </tr>
              <!-- Email -->
              <tr>
                <td style="padding-bottom: 6px; font-size: 13px; color: #555555;">
                  <img src="https://kprasanna713.github.io/email-signature/icons/email.svg" alt="Email" width="16" height="16" style="vertical-align: middle; margin-right: 6px;" />
                  <a href="mailto:kprasanna713@gmail.com" style="color: #555555; text-decoration: none; vertical-align: middle;">kprasanna713@gmail.com</a>
                </td>
              </tr>
              <!-- Location -->
              <tr>
                <td style="padding-bottom: 6px; font-size: 13px; color: #555555;">
                  <img src="https://kprasanna713.github.io/email-signature/icons/location.svg" alt="Location" width="16" height="16" style="vertical-align: middle; margin-right: 6px;" />
                  <span style="vertical-align: middle;">London, UK</span>
                </td>
              </tr>
              <!-- Portfolio -->
              <tr>
                <td style="padding-bottom: 14px; font-size: 13px; color: #555555;">
                  <img src="https://kprasanna713.github.io/email-signature/icons/web.svg" alt="Website" width="16" height="16" style="vertical-align: middle; margin-right: 6px;" />
                  <a href="https://kprasanna713.github.io/prasanna-portfolio/" style="color: #555555; text-decoration: none; vertical-align: middle;">kprasanna713.github.io/prasanna-portfolio</a>
                </td>
              </tr>
            </table>

            <!-- Social Icons -->
            <table cellpadding="0" cellspacing="0" border="0">
              <tr>
                <!-- LinkedIn -->
                <td style="padding-right: 8px;">
                  <a href="https://www.linkedin.com/in/prasanna-kumar-750990181" target="_blank" style="text-decoration: none; display: inline-block;">
                    <img src="https://kprasanna713.github.io/email-signature/icons/linkedin.svg" alt="LinkedIn" width="36" height="36" style="display: block; border-radius: 6px; border: 0;" />
                  </a>
                </td>
                <!-- GitHub -->
                <td style="padding-right: 8px;">
                  <a href="https://github.com/kprasanna713" target="_blank" style="text-decoration: none; display: inline-block;">
                    <img src="https://kprasanna713.github.io/email-signature/icons/github.svg" alt="GitHub" width="36" height="36" style="display: block; border-radius: 6px; border: 0;" />

                </td>
                <!-- Portfolio -->
                <td style="padding-right: 8px;">
                  <a href="https://kprasanna713.github.io/prasanna-portfolio/" target="_blank" style="text-decoration: none; display: inline-block;">

                <td>
                  <a href="mailto:kprasanna713@gmail.com" style="text-decoration: none; display: inline-block;">
                    <img src="https://kprasanna713.github.io/email-signature/icons/mail.svg" alt="Email" width="36" height="36" style="display: block; border-radius: 6px; border: 0;" />

          </td>
        </tr>
      </table>
    </div>
    <!-- ======== EMAIL SIGNATURE END ======== -->
  </div>

  <button class="copy-btn" onclick="copySignature()">Copy Signature</button>

  <script>
    function copySignature() {
      const sig = document.getElementById('signature');
      const range = document.createRange();
      range.selectNodeContents(sig);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
      document.execCommand('copy');
      sel.removeAllRanges();

      const btn = document.querySelector('.copy-btn');
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'Copy Signature';
        btn.classList.remove('copied');
      }, 2000);
    }
  </script>
</body>
</html>
